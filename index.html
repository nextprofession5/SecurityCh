<!DOCTYPE html>
<html>
<body>
    <h2>Log Cleaner</h2>
    <textarea id="rawInput" rows="10" cols="50" placeholder="Paste your log here..."></textarea>
    <br>
    <button onclick="parseLog()">Clean Log</button>
    <h3>Result:</h3>
    <pre id="output"></pre>

    <script>
        function parseLog() {
            let input = document.getElementById('rawInput').value;
            // This regex finds the pattern and extracts the name and URL
            let regex = /\[color=red\](.*?)\[\/color\].*?\[url=(.*?)\]/g;
            let output = "";
            let match;
            
            while ((match = regex.exec(input)) !== null) {
                output += `${match[1].trim()} | ${match[2].trim()}\n`;
            }
            
            document.getElementById('output').textContent = output || "No matches found.";
        }
    </script>
</body>
</html>
